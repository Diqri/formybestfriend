<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <title>Solid Neon Particles</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #video-preview { position: absolute; bottom: 10px; right: 10px; width: 120px; transform: scaleX(-1); opacity: 0.2; border-radius: 5px; }
    </style>
</head>
<body>
    <video id="input-video" style="display:none"></video>
    <video id="video-preview" autoplay playsinline></video>

    <script>
        // --- 1. CORE SETUP ---
        const PARTICLE_COUNT = 5000; 
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        camera.position.z = 12;

        // Tekstur Bulat Glow
        const createTex = () => {
            const c = document.createElement('canvas'); c.width = 64; c.height = 64;
            const ctx = c.getContext('2d');
            const g = ctx.createRadialGradient(32,32,0,32,32,32);
            g.addColorStop(0, 'rgba(255,255,255,1)'); g.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = g; ctx.fillRect(0,0,64,64);
            return new THREE.CanvasTexture(c);
        };

        // Particle System
        const geo = new THREE.BufferGeometry();
        const pos = new Float32Array(PARTICLE_COUNT * 3);
        const cols = new Float32Array(PARTICLE_COUNT * 3);
        for(let i=0; i<PARTICLE_COUNT*3; i++) pos[i] = (Math.random()-0.5)*30;
        
        geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        geo.setAttribute('color', new THREE.BufferAttribute(cols, 3));
        
        const mat = new THREE.PointsMaterial({
            size: 0.12, map: createTex(), transparent: true, blending: THREE.AdditiveBlending, vertexColors: true, depthWrite: false
        });
        const points = new THREE.Points(geo, mat);
        scene.add(points);

        // --- 2. SOLID TEXT SAMPLING ---
        let targets = [];
        const loader = new THREE.FontLoader();
        let fontObj;

        loader.load('https://threejs.org/examples/fonts/helvetiker_bold.typeface.json', f => {
            fontObj = f;
            updateText("Ready?");
        });

        function updateText(txt) {
            // Gunakan TextGeometry untuk mendapatkan volume (isi), bukan cuma outline
            const textGeo = new THREE.TextGeometry(txt, {
                font: fontObj, size: 1.8, height: 0.1, curveSegments: 12
            });
            textGeo.center();

            // Ambil semua vertex dari seluruh permukaan huruf (bukan cuma garis)
            const pts = textGeo.attributes.position.array;
            targets = [];
            for(let i=0; i<PARTICLE_COUNT; i++) {
                const idx = Math.floor(Math.random() * (pts.length/3)) * 3;
                targets.push({ x: pts[idx], y: pts[idx+1], z: pts[idx+2] });
            }
        }

        // --- 3. ANIMATION ---
        function animate() {
            requestAnimationFrame(animate);
            const positions = geo.attributes.position.array;
            const colors = geo.attributes.color.array;
            const time = Date.now() * 0.002;

            for(let i=0; i<PARTICLE_COUNT; i++) {
                const i3 = i*3;
                if(targets[i]) {
                    // Pergerakan Super Smooth
                    positions[i3] += (targets[i].x - positions[i3]) * 0.1;
                    positions[i3+1] += (targets[i].y - positions[i3+1]) * 0.1;
                    positions[i3+2] += (targets[i].z - positions[i3+2]) * 0.1;

                    // Neon Pink-White Glow
                    colors[i3] = 1.0; // R
                    colors[i3+1] = 0.2 + Math.sin(time + i*0.1)*0.2; // G
                    colors[i3+2] = 0.6 + Math.cos(time + i*0.1)*0.4; // B
                }
            }
            geo.attributes.position.needsUpdate = true;
            geo.attributes.color.needsUpdate = true;
            points.rotation.y = Math.sin(time*0.1)*0.15;
            renderer.render(scene, camera);
        }
        animate();

        // --- 4. GESTURE & CAMERA ---
        const video = document.getElementById('input-video');
        const preview = document.getElementById('video-preview');
        let lastG = "";

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, minDetectionConfidence: 0.8 });
        hands.onResults(res => {
            if(res.multiHandLandmarks && res.multiHandLandmarks[0]) {
                const lm = res.multiHandLandmarks[0];
                const up = (t,p) => lm[t].y < lm[p].y;
                const d = Math.hypot(lm[4].x-lm[8].x, lm[4].y-lm[8].y);

                let g = "";
                if(up(8,6) && up(12,10) && !up(16,14)) g = "Peace";
                else if(up(8,6) && up(12,10) && up(16,14) && lm[4].y < lm[3].y) g = "Hii!";
                else if(up(8,6) && !up(12,10) && !up(16,14)) g = "Call me";
                else if(d < 0.05) g = "Love U";
                else if(up(8,6) && up(12,10) && up(16,14) && lm[4].y > lm[3].y) g = "Izin";
                else if(!up(8,6) && !up(12,10) && lm[4].y < lm[3].y) g = "Diqrii <3 Jihann";

                if(g && g !== lastG) { lastG = g; updateText(g); }
            }
        });

        const cam = new Camera(video, {
            onFrame: async () => { await hands.send({image: video}); preview.srcObject = video.srcObject; },
            width: 640, height: 480
        });
        cam.start();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
