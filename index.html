<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <title>Neon Particle Ultra Smooth</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
        #video-preview {
            position: absolute; bottom: 20px; right: 20px; width: 150px;
            border: 1px solid #ff007f; border-radius: 10px; transform: scaleX(-1);
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <video id="input-video" style="display:none"></video>
    <video id="video-preview" autoplay playsinline></video>

    <script>
        // --- CONFIG ---
        const PARTICLE_COUNT = 4000; 
        const SMOOTHING = 0.08; // Kehalusan gerakan (0.01 - 0.1)

        // --- THREE.JS SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        camera.position.z = 10;

        // Texture Bola Cahaya
        const createTexture = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createRadialGradient(32,32,0,32,32,32);
            grad.addColorStop(0, 'rgba(255,255,255,1)');
            grad.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = grad;
            ctx.beginPath(); ctx.arc(32,32,32,0,Math.PI*2); ctx.fill();
            return new THREE.CanvasTexture(canvas);
        };

        // Particles System
        const geo = new THREE.BufferGeometry();
        const positions = new Float32Array(PARTICLE_COUNT * 3);
        const colors = new Float32Array(PARTICLE_COUNT * 3);
        for(let i=0; i<PARTICLE_COUNT*3; i++) positions[i] = (Math.random()-0.5)*20;
        
        geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const mat = new THREE.PointsMaterial({
            size: 0.18, map: createTexture(), transparent: true, 
            blending: THREE.AdditiveBlending, depthWrite: false, vertexColors: true
        });
        const points = new THREE.Points(geo, mat);
        scene.add(points);

        // --- TEXT LOGIC ---
        let targets = [];
        const loader = new THREE.FontLoader();
        let myFont;
        
        loader.load('https://threejs.org/examples/fonts/helvetiker_bold.typeface.json', f => {
            myFont = f;
            updateText("Ready?");
        });

        function updateText(txt) {
            const shapes = myFont.generateShapes(txt, 1.5);
            const textGeo = new THREE.ShapeGeometry(shapes, 6);
            textGeo.computeBoundingBox();
            const center = new THREE.Vector3();
            textGeo.boundingBox.getCenter(center);
            textGeo.translate(-center.x, -center.y, 0);

            // Ambil titik lebih rapat untuk kejelasan
            const pts = textGeo.getAttribute('position').array;
            targets = [];
            for(let i=0; i<PARTICLE_COUNT; i++) {
                const idx = (i % (pts.length/3)) * 3;
                targets.push({ x: pts[idx], y: pts[idx+1], z: pts[idx+2] });
            }
        }

        // --- ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            const pos = geo.attributes.position.array;
            const cols = geo.attributes.color ? geo.attributes.color.array : new Float32Array(PARTICLE_COUNT*3);
            
            for(let i=0; i<PARTICLE_COUNT; i++) {
                const i3 = i*3;
                if(targets[i]) {
                    // Smooth easing
                    pos[i3] += (targets[i].x - pos[i3]) * SMOOTHING;
                    pos[i3+1] += (targets[i].y - pos[i3+1]) * SMOOTHING;
                    pos[i3+2] += (targets[i].z - pos[i3+2]) * SMOOTHING;
                    
                    // Neon Color Pink-White
                    const mix = Math.sin(Date.now()*0.002 + i)*0.5 + 0.5;
                    cols[i3] = 1.0; // Red
                    cols[i3+1] = 0.0 + (mix * 0.8); // Green
                    cols[i3+2] = 0.5 + (mix * 0.5); // Blue
                }
            }
            if(!geo.attributes.color) geo.setAttribute('color', new THREE.BufferAttribute(cols, 3));
            geo.attributes.position.needsUpdate = true;
            geo.attributes.color.needsUpdate = true;

            points.rotation.y = Math.sin(Date.now()*0.0005)*0.2;
            renderer.render(scene, camera);
        }
        animate();

        // --- GESTURE & CAMERA ---
        const video = document.getElementById('input-video');
        const preview = document.getElementById('video-preview');
        let lastG = "";

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, minDetectionConfidence: 0.8 });
        hands.onResults(res => {
            if(res.multiHandLandmarks && res.multiHandLandmarks[0]) {
                const lm = res.multiHandLandmarks[0];
                const up = (t,p) => lm[t].y < lm[p].y;
                const d = Math.hypot(lm[4].x-lm[8].x, lm[4].y-lm[8].y);

                let g = "";
                if(up(8,6) && up(12,10) && !up(16,14)) g = "Peace";
                else if(up(8,6) && up(12,10) && up(16,14) && lm[4].y < lm[3].y) g = "Hii!";
                else if(up(8,6) && !up(12,10) && !up(16,14)) g = "Call me";
                else if(d < 0.05) g = "Love U";
                else if(up(8,6) && up(12,10) && up(16,14) && lm[4].y > lm[3].y) g = "Izin";
                else if(!up(8,6) && !up(12,10) && lm[4].y < lm[3].y) g = "Diqrii <3 Jihann";

                if(g && g !== lastG) { lastG = g; updateText(g); }
            }
        });

        const cam = new Camera(video, {
            onFrame: async () => { 
                await hands.send({image: video}); 
                preview.srcObject = video.srcObject;
            },
            width: 640, height: 480
        });
        cam.start();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
