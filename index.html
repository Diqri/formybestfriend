<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <title>Neon Particle Hand Gesture v2.0</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; background-color: #000000; }
        #three-canvas { width: 100vw; height: 100vh; display: block; }
        #video-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 180px;
            height: 135px;
            overflow: hidden;
            border: 2px solid #ff007f;
            border-radius: 12px;
            transform: scaleX(-1);
            opacity: 0.4;
            transition: opacity 0.3s;
        }
        #video-container:hover { opacity: 0.8; }
        video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <canvas id="three-canvas"></canvas>
    <div id="video-container">
        <video id="input-video"></video>
    </div>

    <script>
        // --- 1. CONFIG & ASSETS ---
        const NEON_PINK = 0xff007f;
        const NEON_WHITE = 0xffffff;
        const PARTICLE_COUNT = 3000; 

        // Fungsi membuat tekstur bola cahaya agar tidak pixelate (kotak)
        function createGlowTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, 'rgba(255,255,255,1)');
            gradient.addColorStop(0.2, 'rgba(255,255,255,0.8)');
            gradient.addColorStop(0.5, 'rgba(255,255,255,0.1)');
            gradient.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 64, 64);
            return new THREE.CanvasTexture(canvas);
        }
        const particleTexture = createGlowTexture();

        // --- 2. THREE.JS SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ 
            canvas: document.getElementById('three-canvas'), 
            antialias: true,
            alpha: true 
        });

        // SOLUSI PIXEL PECH: Set ratio sesuai layar perangkat
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.position.z = 12;

        let currentParticleSystem = null;
        let targetPositions = [];
        const fontLoader = new THREE.FontLoader();
        let activeFont = null;

        // Load Font & Start
        fontLoader.load('https://threejs.org/examples/fonts/helvetiker_bold.typeface.json', (font) => {
            activeFont = font;
            createTextParticles("Ready?", font);
        });

        function createTextParticles(text, font) {
            const shapes = font.generateShapes(text, 1.2);
            const geometry = new THREE.ShapeGeometry(shapes, 12); // Smoothness curve 12
            geometry.computeBoundingBox();
            
            const xMid = -0.5 * (geometry.boundingBox.max.x - geometry.boundingBox.min.x);
            const yMid = -0.5 * (geometry.boundingBox.max.y - geometry.boundingBox.min.y);
            geometry.translate(xMid, yMid, 0);

            const pointsArr = geometry.getAttribute('position').array;
            targetPositions = [];
            for (let i = 0; i < pointsArr.length; i += 3) {
                targetPositions.push(new THREE.Vector3(pointsArr[i], pointsArr[i+1], pointsArr[i+2]));
            }

            if (!currentParticleSystem) {
                const particleGeom = new THREE.BufferGeometry();
                const positions = new Float32Array(PARTICLE_COUNT * 3);
                const colors = new Float32Array(PARTICLE_COUNT * 3);
                const pColor = new THREE.Color(NEON_PINK);

                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    positions[i * 3] = (Math.random() - 0.5) * 40;
                    positions[i * 3 + 1] = (Math.random() - 0.5) * 40;
                    positions[i * 3 + 2] = (Math.random() - 0.5) * 20;

                    const colorLerp = pColor.clone().lerp(new THREE.Color(NEON_WHITE), Math.random() * 0.4);
                    colors[i * 3] = colorLerp.r;
                    colors[i * 3 + 1] = colorLerp.g;
                    colors[i * 3 + 2] = colorLerp.b;
                }

                particleGeom.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                particleGeom.setAttribute('color', new THREE.BufferAttribute(colors, 3));

                const particleMat = new THREE.PointsMaterial({
                    size: 0.25,
                    vertexColors: true,
                    blending: THREE.AdditiveBlending,
                    transparent: true,
                    map: particleTexture,
                    depthWrite: false,
                    sizeAttenuation: true
                });

                currentParticleSystem = new THREE.Points(particleGeom, particleMat);
                scene.add(currentParticleSystem);
            }
        }

        // --- 3. ANIMATION LOOP ---
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            if (currentParticleSystem && targetPositions.length > 0) {
                const posAttr = currentParticleSystem.geometry.attributes.position;
                for (let i = 0; i < PARTICLE_COUNT; i++) {
                    const i3 = i * 3;
                    const target = targetPositions[i % targetPositions.length];
                    
                    // Smooth lerping (0.05 - 0.1 adalah angka ajaib untuk kehalusan)
                    posAttr.array[i3] += (target.x - posAttr.array[i3]) * 0.07;
                    posAttr.array[i3 + 1] += (target.y - posAttr.array[i3 + 1]) * 0.07;
                    posAttr.array[i3 + 2] += (target.z - posAttr.array[i3 + 2]) * 0.07;
                }
                posAttr.needsUpdate = true;

                // Floating & Rotating effect
                currentParticleSystem.rotation.y = Math.sin(time * 0.2) * 0.2;
                currentParticleSystem.position.y = Math.sin(time * 1.5) * 0.3;
            }
            renderer.render(scene, camera);
        }
        animate();

        // --- 4. GESTURE LOGIC ---
        function isFingerUp(lm, tip, pip) { return lm[tip].y < lm[pip].y; }

        let lastGesture = "";
        let lastTime = 0;

        function onResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const lm = results.multiHandLandmarks[0];
                
                const indexUp = isFingerUp(lm, 8, 6);
                const middleUp = isFingerUp(lm, 12, 10);
                const ringUp = isFingerUp(lm, 16, 14);
                const pinkyUp = isFingerUp(lm, 20, 18);
                const thumbUp = lm[4].y < lm[3].y;
                const dTI = Math.sqrt(Math.pow(lm[4].x-lm[8].x,2) + Math.pow(lm[4].y-lm[8].y,2));

                let gesture = "";
                if (indexUp && middleUp && !ringUp && !pinkyUp) gesture = "Peace";
                else if (indexUp && middleUp && ringUp && pinkyUp && thumbUp) gesture = "Hii!";
                else if (indexUp && !middleUp && !ringUp && !pinkyUp) gesture = "Call me";
                else if (dTI < 0.05 && !middleUp && !ringUp) gesture = "Love U";
                else if (indexUp && middleUp && ringUp && pinkyUp && !thumbUp) gesture = "Izin";
                else if (!indexUp && !middleUp && !ringUp && !pinkyUp && thumbUp) gesture = "Diqrii <3 Jihann";

                if (gesture !== "" && gesture !== lastGesture && Date.now() - lastTime > 1200) {
                    lastGesture = gesture;
                    lastTime = Date.now();
                    if (activeFont) createTextParticles(gesture, activeFont);
                }
            }
        }

        // --- 5. MEDIAPIPE START ---
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.75, minTrackingConfidence: 0.75 });
        hands.onResults(onResults);

        const videoElement = document.getElementById('input-video');
        const cameraSetup = new Camera(videoElement, {
            onFrame: async () => { await hands.send({image: videoElement}); },
            width: 640, height: 480
        });
        cameraSetup.start();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
